<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atplan // edit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d0d0d;
            color: #33ff33;
            font-family: "Courier New", Courier, monospace;
            font-size: 14px;
            padding: 2rem;
            min-height: 100vh;
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid #33ff33;
            padding-bottom: 1rem;
        }

        header h1 {
            font-size: 1.4rem;
            letter-spacing: 0.1em;
        }

        header p {
            color: #1a8c1a;
            margin-top: 0.25rem;
            font-size: 0.85rem;
        }

        .field {
            margin-bottom: 1.5rem;
        }

        .field label {
            display: block;
            color: #1a8c1a;
            margin-bottom: 0.4rem;
        }

        .field input,
        .field textarea {
            background: #0d0d0d;
            border: none;
            border-bottom: 1px solid #33ff33;
            color: #33ff33;
            font-family: "Courier New", Courier, monospace;
            font-size: 14px;
            padding: 0.4rem 0.5rem;
            width: 100%;
            outline: none;
        }

        .field input:focus,
        .field textarea:focus {
            border-bottom-color: #66ff66;
        }

        .field textarea {
            resize: vertical;
            min-height: 200px;
            border: 1px solid #33ff33;
            padding: 0.75rem;
            line-height: 1.6;
        }

        .field textarea:focus {
            border-color: #66ff66;
        }

        .actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        button {
            background: none;
            border: 1px solid #33ff33;
            color: #33ff33;
            font-family: "Courier New", Courier, monospace;
            font-size: 14px;
            padding: 0.5rem 1.5rem;
            cursor: pointer;
        }

        button[type="submit"] {
            background: #33ff33;
            color: #0d0d0d;
        }

        button:hover {
            background: #33ff33;
            color: #0d0d0d;
        }

        a {
            color: #1a8c1a;
            text-decoration: none;
        }

        a:hover {
            color: #33ff33;
        }

        .error {
            color: #ff3333;
            margin-bottom: 1.5rem;
        }

        .token-form {
            margin-top: 2rem;
        }

        .token-form .field {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .token-form .field label {
            white-space: nowrap;
            margin-bottom: 0;
        }

        .token-form .field input {
            width: 280px;
        }

        footer {
            margin-top: 3rem;
            color: #1a4d1a;
            font-size: 0.8rem;
            border-top: 1px solid #1a4d1a;
            padding-top: 1rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>atplan // edit</h1>
        <p>update your .plan</p>
    </header>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    {% if not authenticated %}
        <div class="token-form">
            <form method="POST" action="/edit">
                <div class="field">
                    <label>token:</label>
                    <input type="password" name="token" autofocus autocomplete="off">
                    <button type="submit">enter</button>
                </div>
            </form>
        </div>

    {% else %}
        <form method="POST" action="/save">
            <div class="field">
                <label>status:</label>
                <input
                    type="text"
                    name="status"
                    value="{{ plan.status if plan and plan.status else '' }}"
                    maxlength="100"
                    autocomplete="off"
                    spellcheck="false"
                >
            </div>

            <div class="field">
                <label>project:</label>
                <input
                    type="text"
                    name="project"
                    value="{{ plan.project if plan and plan.project else '' }}"
                    maxlength="256"
                    autocomplete="off"
                    spellcheck="false"
                >
            </div>

            <div class="field">
                <label>plan:</label>
                <textarea
                    name="text"
                    maxlength="10000"
                    spellcheck="false"
                >{{ plan.text if plan and plan.text else '' }}</textarea>
            </div>

            <div class="actions">
                <button type="submit">save</button>
                <a href="/finger/{{ handle }}"><button type="button">cancel</button></a>
            </div>
        </form>
    {% endif %}

    <footer>
        atplan // atplan.io
    </footer>

</body>
</html>
